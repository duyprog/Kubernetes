apiVersion: v1
kind: Pod
metadata:
  name: multi-container-pod
  namespace: default
  labels:
    app: multi-container-pod
spec:
  terminationGracePeriodSeconds: 60

  # Init container: wait for backend service before starting
  initContainers:
    - name: wait-for-backend
      image: busybox:1.36
      command: ['sh', '-c', 'until nc -z backend-service 8080; do echo "waiting..."; sleep 2; done']

  containers:
    # Main application container
    - name: app
      image: my-registry/my-app:1.0
      ports:
        - name: http
          containerPort: 8080

      env:
        - name: APP_ENV
          value: "production"
        - name: LOG_DIR
          value: "/var/log/app"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name

      resources:
        requests:
          cpu: "250m"
          memory: "256Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"

      livenessProbe:
        httpGet:
          path: /healthz
          port: 8080
        initialDelaySeconds: 15
        periodSeconds: 10
        failureThreshold: 3

      readinessProbe:
        httpGet:
          path: /ready
          port: 8080
        initialDelaySeconds: 5
        periodSeconds: 5

      lifecycle:
        preStop:
          exec:
            command: ["/bin/sh", "-c", "sleep 10"]

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]

      volumeMounts:
        - name: log-vol
          mountPath: /var/log/app
        - name: tmp-vol
          mountPath: /tmp

    # Sidecar container: ships logs to a remote system
    - name: log-shipper
      image: fluentd:v1.16-debian
      env:
        - name: FLUENTD_ARGS
          value: "-c /fluentd/etc/fluent.conf"
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "100m"
          memory: "128Mi"
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      volumeMounts:
        - name: log-vol
          mountPath: /var/log/app
          readOnly: true

  volumes:
    - name: log-vol
      emptyDir: {}
    - name: tmp-vol
      emptyDir: {}
